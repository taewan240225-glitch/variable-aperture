name: Deploy Firebase Hosting

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Auth to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/924982387744/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider
          service_account: firebase-hosting-deploy@uniwani-budget-240225.iam.gserviceaccount.com

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy Hosting
        run: firebase deploy --only hosting --project uniwani-budget-240225
